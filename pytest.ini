[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
# Depo kökünü import yoluna ekle — `pytest` ve `python -m pytest` ikisi de çalışsın
# (backend/ ve ai/ paketleri kökten import edilir).
pythonpath = .
addopts = -q
filterwarnings =
    ignore::DeprecationWarning
