# Ultralytics YOLO veri kümesi yapılandırması — fine-tuning için.
# Komite TOGG/etiketli veriyi paylaşınca yalnızca yollar ve (gerekirse) sınıflar
# güncellenir. Sınıflar config/settings.py:TARGET_CLASSES ile birebir aynıdır.
#
# Beklenen klasör yapısı (YOLO formatı):
#   datasets/yolguvenligi/
#     images/train/*.jpg   labels/train/*.txt
#     images/val/*.jpg     labels/val/*.txt
#     images/test/*.jpg    labels/test/*.txt
# Her .txt satırı:  <class_id> <x_center> <y_center> <w> <h>   (0-1 normalize)

# `path` repo köküne görelidir. train.py:_resolve_data_yaml() bunu gerçek koşumda
# mutlak yola çevirir (ultralytics datasets_dir önbelleğini atlar; taşınabilir çözümleme).
path: datasets/yolguvenligi
train: images/train
val: images/val
test: images/test

names:
  0: car
  1: minibus
  2: bus
  3: truck
  4: motorcycle
  5: license_plate
  6: person
  7: phone
  8: cigarette
  9: seatbelt
  10: headphone

# Açık kaynak köprüsü (transkript: açık kaynak veri kullanımı serbest):
#  - car/bus/truck/motorcycle/person/phone -> COCO (ayrı sınıflar; birleştirme yok)
#  - minibus                -> COCO'da YOK → Türk trafiği verisi (Roboflow) gerekir
#  - license_plate          -> CCPD / OpenALPR / TR-plaka setleri
#  - cigarette/seatbelt/headphone -> küçük özel etiketleme + augmentation
