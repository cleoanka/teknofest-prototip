name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (mock) + ruff
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        # LFS model ağırlıkları test için gerekmez (mock mod) — indirmeyi atla.

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        # Yalnız çekirdek/test bağımlılıkları — ağır YZ paketleri (torch, ultralytics,
        # easyocr, mediapipe) mock modda gerekmez; sistem otomatik MOCK'a düşer (K4).
        run: |
          python -m pip install --upgrade pip
          pip install \
            "fastapi==0.115.6" "uvicorn[standard]==0.34.0" \
            "pydantic==2.10.4" "pydantic-settings==2.7.1" \
            "websockets==14.1" "python-multipart==0.0.20" "httpx==0.28.1" \
            "PyJWT[crypto]>=2.9.0" "slowapi==0.1.9" \
            "prometheus-fastapi-instrumentator==6.1.0" "prometheus-client>=0.19.0" \
            "numpy>=1.26,<2.2" "opencv-python-headless==4.10.0.84" "pillow==11.0.0" \
            "pytest==8.3.4" "pytest-asyncio==0.25.0" \
            ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests (deterministic mock mode)
        env:
          AI_MODE: mock
          LP_MOCK: "true"
          DB_PATH: ":memory:"
        run: pytest -q
